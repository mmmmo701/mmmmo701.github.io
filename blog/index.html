<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blogs — Mike Mo</title>
    <link rel="stylesheet" href="/css/base.css" />
    <style>
        /* Blog index accent: pink */
        :root {
            --bg: #200720
        }

        .blogpost {
            padding: 18px;
            border-radius: 10px;
            border-left: 4px solid transparent;
            margin-bottom: 36px;
            background:
                linear-gradient(180deg, rgba(238, 179, 187, 0.08), rgba(238, 179, 187, 0.04)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.005));
        }

        a{
            color:#eeb3bb;
            text-decoration:none;
        }
        a.simple{color:#eeb3bb}

        .blogpost h2{
            margin:0 0 6px;
            font-size:2rem;
            padding: 15px 0 15px 15px;
        } 
        .blogpost a{
            color:#eeb3bb;
            font-size:2rem;
            text-decoration:none;
        }
        .blogpost p{
            margin:0;
            color:var(--muted);
            line-height:1.45;
            padding: 0 15px 15px 15px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="site-title">Blogs - Mike Mo</div>
            <h1 class="name">Mike Mo</h1>
        </header>

        <div class="entry-list">
            <div class="one-entry">
                <div>
                    <div style="font-weight:600">
                        <a href="posts/some-math-finance.html">Some Mathematics of Finance</a>
                    </div>
                    <div class="meta">A study notes of section 1.1 on Mathematics of Finance by Saari.</div>
                </div>
            </div>
        </div>

        <!-- back to home button -->
        <div class="actions" style="margin-top:14px">
            <a class="simple" href="../index.html">Back to home →</a>
        </div>
        <footer>Simple — fast — dark</footer>
    </div>
</body>
</html>
